<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SULOVA STORE!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1920&q=80') no-repeat center center/cover;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.4) 100%);
            z-index: 1;
        }

        .contact-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            padding: 60px 50px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .contact-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0 0 10px;
            color: #f7e6d4;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #bfa58a;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 45px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.15rem;
            color: #eaeaea;
            transition: transform 0.3s ease;
        }

        .info-item:hover {
            transform: scale(1.05);
        }

        .info-item i {
            font-size: 1.5rem;
            color: #d4af37;
        }

        .info-item a {
            color: #eaeaea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-item a:hover {
            color: #d4af37;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 40px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            font-weight: 400;
            border: 1px solid #d4af37;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
        }

        .back-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="contact-card">
        <h1>SULOVA STORE!</h1>
        <div class="subtitle">Get In Touch</div>
        
        <div class="contact-info">
            <div class="info-item">
                <i class="fa-solid fa-phone"></i>
                <a href="tel:+6281234567890">+62 812-3456-7890</a>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-envelope"></i>
                <a href="mailto:hello@sulovastore.com">hello@sulovastore.com</a>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Sulova Fashion District, Jakarta</span>
            </div>
        </div>

        <a href="index.html" class="back-btn" onclick="window.close();">Back to Store</a>
    </div>
</body>
</html>
